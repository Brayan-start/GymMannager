services:
  - type: web
    name: gymmanager
    env: python
    region: us-east  # or frankfurt (closer to Bolivia)
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app --workers 4 --bind 0.0.0.0:$PORT --timeout 120 --access-logfile -
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: gymmanager-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.9

databases:
  - name: gymmanager-db
    region: us-east
    plan: free
    databaseName: gymmanager
    user: gymmanager
    ipAllowList: []
