{% extends "base.html" %}
{% block title %}{{ 'Editar' if tipo else 'Nuevo' }} Tipo de Membresía{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">{{ 'Editar' if tipo else 'Nuevo' }} Tipo de Membresía</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Nombre *</label>
                        <input type="text" name="nombre" class="form-control" value="{{ tipo.nombre if tipo else '' }}" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Precio *</label>
                            <div class="input-group">
                                <span class="input-group-text">Bs.</span>
                                <input type="number" step="0.01" name="precio" class="form-control" value="{{ tipo.precio if tipo else '' }}" required>
                            </div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Duración (días) *</label>
                            <input type="number" name="duracion_dias" class="form-control" value="{{ tipo.duracion_dias if tipo else '30' }}" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="3">{{ tipo.descripcion if tipo else '' }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('membresias.listar_tipos') }}" class="btn btn-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-dark">{{ 'Actualizar' if tipo else 'Guardar' }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
