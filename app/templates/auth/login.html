{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block public_content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="#198754" viewBox="0 0 16 16">
                        <path d="M4.5 1a.5.5 0 0 1 .5.5V4h6V1.5a.5.5 0 0 1 1 0v3a.5.5 0 0 1-.5.5H10v3h.5a.5.5 0 0 1 0 1H10v3h.5a.5.5 0 0 1 .5.5v3a.5.5 0 0 1-1 0V12H5v2.5a.5.5 0 0 1-1 0v-3a.5.5 0 0 1 .5-.5H5V9H4.5a.5.5 0 0 1 0-1H5V5h-.5A.5.5 0 0 1 4 4.5v-3a.5.5 0 0 1 .5-.5z"/>
                    </svg>
                    <h4 class="mt-2 fw-bold">GymManager</h4>
                    <p class="text-muted">Inicia sesión para continuar</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-medium"><i class="bi bi-envelope"></i> Correo electrónico</label>
                        <input type="email" name="email" class="form-control" placeholder="tu@correo.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium"><i class="bi bi-lock"></i> Contraseña</label>
                        <div class="input-group">
                            <input type="password" name="password" class="form-control border-end-0" placeholder="••••••••" required>
                            <button type="button" class="btn btn-outline-secondary toggle-password" tabindex="-1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2"><i class="bi bi-box-arrow-in-right"></i> Ingresar</button>
                </form>
                <hr class="my-3">
                <p class="text-center mb-0">
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none"><i class="bi bi-person-plus"></i> ¿No tienes cuenta? Regístrate</a>
                </p>
                <p class="text-center mt-2">
                    <a href="{{ url_for('auth.index') }}" class="text-muted small"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
