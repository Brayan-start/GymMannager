{% extends "base.html" %}
{% block title %}Registro{% endblock %}
{% block public_content %}
<div class="row justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-dumbbell fs-1 text-success"></i>
                    <h4 class="mt-2">Crear Cuenta</h4>
                    <p class="text-muted">Únete a GymManager</p>
                </div>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-medium"><i class="bi bi-person"></i> Usuario</label>
                        <input type="text" name="username" class="form-control" placeholder="Elige un usuario" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium"><i class="bi bi-envelope"></i> Email</label>
                        <input type="email" name="email" class="form-control" placeholder="tu@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium"><i class="bi bi-lock"></i> Contraseña</label>
                        <div class="input-group">
                            <input type="password" name="password" class="form-control border-end-0" placeholder="••••••••" required>
                            <button type="button" class="btn btn-outline-secondary toggle-password" tabindex="-1">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2"><i class="bi bi-person-plus"></i> Registrarse</button>
                </form>
                <hr class="my-3">
                <p class="text-center mb-0">
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none"><i class="bi bi-box-arrow-in-right"></i> ¿Ya tienes cuenta? Inicia sesión</a>
                </p>
                <p class="text-center mt-2">
                    <a href="{{ url_for('auth.index') }}" class="text-muted small"><i class="bi bi-arrow-left"></i> Volver al inicio</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
